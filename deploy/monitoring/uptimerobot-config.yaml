# UptimeRobot Configuration
# These checks are set up to monitor critical endpoints every 60 seconds
# For production setup, use: https://uptimerobot.com

monitors:
  - name: "API Health Check"
    url: "https://api.bluecollar.app/health"
    interval: 60
    type: http
    
  - name: "API Ready Check"
    url: "https://api.bluecollar.app/ready"
    interval: 60
    type: http
    
  - name: "App Home Page"
    url: "https://bluecollar.app"
    interval: 60
    type: http

status_page_url: "https://status.bluecollar.app"
