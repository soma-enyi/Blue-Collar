name: Commit Message Validation

on:
  pull_request:
    types: [opened, edited, synchronize]

permissions:
  contents: read

jobs:
  validate-commit-messages:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5
        with:
          fetch-depth: 0

      - name: Validate PR title
        shell: bash
        run: |
          title="${{ github.event.pull_request.title }}"
          if [[ ! "$title" =~ ^(feat|fix|docs|style|refactor|perf|test|chore|ci)(\([a-z0-9_-]+\))?:\ .+ ]]; then
            echo "ERROR: Pull request title must follow Conventional Commits."
            echo "Example: feat(contracts): add unit test coverage"
            exit 1
          fi

      - name: Validate commit messages
        shell: bash
        run: |
          git log --format=%s "${{ github.event.pull_request.base.sha }}"..HEAD | while IFS= read -r msg; do
            if [[ -z "$msg" ]]; then
              continue
            fi
            if [[ ! "$msg" =~ ^(feat|fix|docs|style|refactor|perf|test|chore|ci)(\([a-z0-9_-]+\))?:\ .+ ]]; then
              echo "ERROR: Invalid commit message: $msg"
              echo "Commit messages must follow Conventional Commits."
              exit 1
            fi
          done
