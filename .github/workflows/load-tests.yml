name: Load Tests

on:
  push:
    branches: [main]
  schedule:
    # Run nightly at 03:00 UTC
    - cron: '0 3 * * *'
  workflow_dispatch:
    inputs:
      scenario:
        description: 'k6 scenario to run'
        required: false
        default: 'smoke'
        type: choice
        options: [smoke, load, stress, soak, spike]

env:
  PNPM_VERSION: 9

jobs:
  load-test:
    name: API Load Test (${{ github.event.inputs.scenario || 'smoke' }})
    runs-on: ubuntu-latest

    services:
      postgres:
        image: postgres:16
        env:
          POSTGRES_USER: bluecollar
          POSTGRES_PASSWORD: bluecollar
          POSTGRES_DB: bluecollar_test
        ports:
          - 5432:5432
        options: >-
          --health-cmd pg_isready
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5

    steps:
      - uses: actions/checkout@v4

      - uses: pnpm/action-setup@v4
        with:
          version: ${{ env.PNPM_VERSION }}

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: pnpm
          cache-dependency-path: pnpm-lock.yaml

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Run migrations and seed
        run: |
          pnpm prisma migrate deploy
          pnpm seed
        working-directory: packages/api
        env:
          DATABASE_URL: postgresql://bluecollar:bluecollar@localhost:5432/bluecollar_test

      - name: Build API
        run: pnpm build
        working-directory: packages/api

      - name: Start API server
        run: node dist/index.js &
        working-directory: packages/api
        env:
          DATABASE_URL: postgresql://bluecollar:bluecollar@localhost:5432/bluecollar_test
          JWT_SECRET: load-test-secret
          PORT: 3000

      - name: Wait for API
        run: |
          for i in $(seq 1 30); do
            curl -sf http://localhost:3000/api/workers && break
            sleep 2
          done

      - name: Install k6
        run: |
          curl https://github.com/grafana/k6/releases/download/v0.54.0/k6-v0.54.0-linux-amd64.tar.gz -L | tar xvz --strip-components 1

      - name: Run API load test
        run: ./k6 run --env SCENARIO=${{ github.event.inputs.scenario || 'smoke' }} --out json=results.json deploy/load-tests/api-load-test.js
        env:
          BASE_URL: http://localhost:3000/api

      - name: Run DB performance test
        run: ./k6 run --out json=db-results.json deploy/load-tests/db-performance-test.js
        env:
          BASE_URL: http://localhost:3000/api

      - name: Upload load test results
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: load-test-results
          path: |
            results.json
            db-results.json
          retention-days: 30
