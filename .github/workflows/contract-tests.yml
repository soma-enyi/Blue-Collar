name: Contract Tests

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

env:
  PNPM_VERSION: 9

jobs:
  contract-consumer:
    name: Pact Consumer Tests
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: packages/api

    steps:
      - uses: actions/checkout@v4

      - uses: pnpm/action-setup@v4
        with:
          version: ${{ env.PNPM_VERSION }}

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: pnpm
          cache-dependency-path: pnpm-lock.yaml

      - name: Install dependencies
        run: pnpm install --frozen-lockfile
        working-directory: .

      - name: Run consumer contract tests
        run: pnpm vitest run src/__tests__/contract/consumer.workers.pact.test.ts
        env:
          JWT_SECRET: test-secret

      - name: Upload pact files
        uses: actions/upload-artifact@v4
        with:
          name: pacts
          path: packages/api/pacts/
          retention-days: 7

  contract-provider:
    name: Pact Provider Verification
    runs-on: ubuntu-latest
    needs: contract-consumer
    defaults:
      run:
        working-directory: packages/api

    services:
      postgres:
        image: postgres:16
        env:
          POSTGRES_USER: bluecollar
          POSTGRES_PASSWORD: bluecollar
          POSTGRES_DB: bluecollar_test
        ports:
          - 5432:5432
        options: >-
          --health-cmd pg_isready
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5

    steps:
      - uses: actions/checkout@v4

      - uses: pnpm/action-setup@v4
        with:
          version: ${{ env.PNPM_VERSION }}

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: pnpm
          cache-dependency-path: pnpm-lock.yaml

      - name: Install dependencies
        run: pnpm install --frozen-lockfile
        working-directory: .

      - name: Download pact files
        uses: actions/download-artifact@v4
        with:
          name: pacts
          path: packages/api/pacts/

      - name: Run migrations
        run: pnpm prisma migrate deploy
        env:
          DATABASE_URL: postgresql://bluecollar:bluecollar@localhost:5432/bluecollar_test

      - name: Run provider verification
        run: pnpm vitest run src/__tests__/contract/provider.verification.pact.test.ts
        env:
          DATABASE_URL: postgresql://bluecollar:bluecollar@localhost:5432/bluecollar_test
          JWT_SECRET: test-secret
