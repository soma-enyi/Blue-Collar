name: Migration Safety Check

on:
  pull_request:
    paths:
      - 'packages/api/prisma/migrations/**'

permissions:
  pull-requests: write

jobs:
  check-migration:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Check for destructive migrations
        run: |
          DESTRUCTIVE_PATTERNS="DROP COLUMN|DROP TABLE|ALTER COLUMN"
          MIGRATIONS=$(find packages/api/prisma/migrations -name "migration.sql" -type f)
          
          for migration in $MIGRATIONS; do
            if grep -iE "$DESTRUCTIVE_PATTERNS" "$migration"; then
              echo "❌ Destructive migration detected in $migration"
              echo "This migration requires a 'migration:destructive' label"
              exit 1
            fi
          done
          echo "✅ No destructive migrations found"

      - name: Require destructive label if needed
        if: failure()
        uses: actions/github-script@v7
        with:
          script: |
            const labels = context.payload.pull_request.labels.map(l => l.name);
            if (!labels.includes('migration:destructive')) {
              core.setFailed('Add migration:destructive label for destructive migrations');
            }
